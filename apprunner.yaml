version: 1.0
runtime: python311
build:
  commands:
    pre-build:
      - yum update -y
      - yum install -y wget
      - yum install -y gcc gcc-c++ make git glibc-static libstdc++-static
      - yum install -y libstdc++ libstdc++-devel
      - yum install -y python3-pip
      # Try to get a newer version of Stockfish that might be more compatible
      - mkdir -p bin
      - wget -O stockfish.tar https://github.com/official-stockfish/Stockfish/releases/download/sf_16/stockfish-ubuntu-x86-64.tar
      - tar -xf stockfish.tar
      - mv stockfish/stockfish-ubuntu-x86-64 bin/stockfish
      - chmod +x bin/stockfish
      - rm -rf stockfish.tar stockfish
      - bin/stockfish --version
    build:
      - cd /app && pip install -r requirements.txt
run:
  runtime-version: 3.11.11
  command: /usr/bin/python3 -c "from main import app; app.run(host='0.0.0.0', port=5000)"
  network:
    port: 5000
  env:
    - name: FLASK_APP
      value: main.py
    - name: FLASK_ENV
      value: production
    - name: PYTHONUNBUFFERED
      value: "1"
    - name: FLASK_DEBUG
      value: "0"