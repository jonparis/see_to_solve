version: 1.0
runtime: python311
build:
  commands:
    pre-build:
      - yum update -y
      - yum groupinstall -y "Development Tools"
      - mkdir -p bin
      - git clone --branch sf_17 --depth 1 https://github.com/official-stockfish/Stockfish.git
      - cd Stockfish/src
      - make build ARCH=x86-64-modern
      - cp stockfish ../../bin/
      - cd ../..
      - rm -rf Stockfish
      - chmod +x bin/stockfish
    build:
      - pip install -r requirements.txt
run:
  runtime-version: 3.11.11
  command: python main.py
  network:
    port: 5000 