version: 1.0
runtime: python311
build:
  commands:
    pre-build:
      - mkdir -p bin
      - wget https://github.com/official-stockfish/Stockfish/releases/download/sf_17/stockfish-ubuntu-x86-64-modern -O bin/stockfish
      - chmod +x bin/stockfish
    build:
      - pip install -r requirements.txt
run:
  runtime-version: 3.11.11
  command: python main.py
  network:
    port: 5000 