version: 1.0
runtime: python311
build:
  commands:
    pre-build:
      - yum update -y
      - yum install -y wget
      - mkdir -p bin
      - wget https://github.com/official-stockfish/Stockfish/releases/download/sf_16/stockfish-ubuntu-x86-64-avx2.zip
      - unzip stockfish-ubuntu-x86-64-avx2.zip
      - mv stockfish-ubuntu-x86-64-avx2/stockfish-ubuntu-x86-64-avx2 bin/stockfish
      - chmod +x bin/stockfish
      - rm -rf stockfish-ubuntu-x86-64-avx2.zip stockfish-ubuntu-x86-64-avx2
    build:
      - pip install -r requirements.txt
run:
  runtime-version: 3.11.11
  command: python main.py
  network:
    port: 5000