version: 1.0
runtime: python311
build:
  commands:
    pre-build:
      - yum update -y
      - yum install -y wget
      - yum install -y gcc gcc-c++ make git glibc-static libstdc++-static
      - yum install -y libstdc++ libstdc++-devel
      # Install newer libstdc++
      - yum install -y centos-release-scl
      - yum install -y devtoolset-11-gcc-c++
      - source /opt/rh/devtoolset-11/enable
      - mkdir -p bin
      - wget -O stockfish.tar https://github.com/official-stockfish/Stockfish/releases/download/sf_17/stockfish-ubuntu-x86-64-avx2.tar
      - tar -xf stockfish.tar
      - mv stockfish/stockfish-ubuntu-x86-64-avx2 bin/stockfish
      - chmod +x bin/stockfish
      - rm -rf stockfish.tar stockfish
      - bin/stockfish --version
    build:
      - pip install -r requirements.txt
run:
  runtime-version: 3.11.11
  command: python main.py
  network:
    port: 5000