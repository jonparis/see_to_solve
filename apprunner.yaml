version: 1.0
runtime: python311
build:
  commands:
    pre-build:
      - yum update -y
      - yum install -y epel-release
      - yum install -y stockfish
      - mkdir -p bin
      - cp /usr/bin/stockfish bin/
    build:
      - pip install -r requirements.txt
run:
  runtime-version: 3.11.11
  command: python main.py
  network:
    port: 5000